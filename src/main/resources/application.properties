spring.datasource.url=jdbc:mysql://localhost:3306/cricform
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=${REDIS_PASSWORD}
rapidapi.key=${RAPIDAPI_KEY}
rapidapi.host=cricbuzz-cricket.p.rapidapi.com
rapidapi.baseurl=https://cricbuzz-cricket.p.rapidapi.com
cricform.default.window=10
cricform.cache.ttl.hours=24
cricform.scheduler.cron=0 0 0 * * *
